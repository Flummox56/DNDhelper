events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        server api-gateway-service:8080;
    }

    upstream sheet_service {
        server sheet-service:8080;
    }

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location /api/auth/ {
            proxy_pass http://api_gateway/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /api/monsters/ {
            proxy_pass http://sheet_service/api/monsters/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            
            proxy_pass_request_headers on;
            
            proxy_set_header X-Original-URI $request_uri;
        }

        location /swagger/gateway/ {
            proxy_pass http://api_gateway/swagger/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location /swagger/monsters/ {
            proxy_pass http://sheet_service/swagger/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            
            sub_filter_once off;
            sub_filter '"/swagger/' '"/swagger/monsters/';
            sub_filter '"/swagger/v1/' '"/swagger/monsters/v1/';
        }

        location /health {
            return 200 "Healthy\n";
            add_header Content-Type text/plain;
        }
    }
}