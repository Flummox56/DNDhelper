events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        server api-gateway-service:8080;
    }

    upstream sheet_service {
        server sheet-service:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Логи
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # API Gateway (авторизация, пользователи)
        location /api/auth/ {
            proxy_pass http://api_gateway/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Sheet Service (работа с листами персонажей)
        location /api/sheets/ {
            proxy_pass http://sheet_service/api/sheets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Прокидываем токен авторизации
            proxy_set_header Authorization $http_authorization;
        }

        # Swagger для каждого сервиса (опционально)
        location /swagger/gateway/ {
            proxy_pass http://api_gateway/swagger/;
            proxy_set_header Host $host;
        }

        location /swagger/sheets/ {
            proxy_pass http://sheet_service/swagger/;
            proxy_set_header Host $host;
        }

        # Health checks
        location /health {
            return 200 "Healthy\n";
            add_header Content-Type text/plain;
        }
    }
}